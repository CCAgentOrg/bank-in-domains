name: Weekly data release

on:
  schedule:
    # Weekly on Sunday at 06:00 UTC (11:30 IST)
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force a specific version (e.g., 2026.7.2). Leave empty for auto.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.force_version }}" ]; then
            echo "tag=v${{ github.event.inputs.force_version }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)

          # Scan existing tags to find the highest rev for this month
          LAST_REV=$(git tag --list "v${YEAR}.${MONTH}.*" \
            | sed "s/^v${YEAR}\.${MONTH}\.//" \
            | sort -n \
            | tail -1)

          NEXT_REV=$((LAST_REV + 1))
          TAG="v${YEAR}.${MONTH}.${NEXT_REV}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          echo "rev=$NEXT_REV" >> $GITHUB_OUTPUT

      - name: Compute changelog & delta
        id: changelog
        shell: bash
        run: |
          # Find previous release tag (the one right before this)
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1 || true)

          THIS_TAG="${{ steps.version.outputs.tag }}"

          echo "### tag=$THIS_TAG prev=$PREV_TAG"

          # Domain counts from current data
          DOMAIN_COUNT=$(wc -l < data/bank_domains_status.csv 2>/dev/null || echo 0)
          NEW_COUNT=$(wc -l < data/new_subdomains.txt 2>/dev/null || echo 0)
          CT_EXPANSION_COUNT=$(wc -l < data/bank_domains_ct_expansion.csv 2>/dev/null || echo 0)

          # Compute what changed vs previous tag
          CHANGELOG="## ${THIS_TAG}\n\n"
          CHANGELOG+="**Release date:** $(date -u '+%Y-%m-%d %H:%M UTC')\n\n"

          echo "DOMAIN_COUNT=$DOMAIN_COUNT" >> $GITHUB_OUTPUT
          echo "NEW_COUNT=$NEW_COUNT" >> $GITHUB_OUTPUT
          echo "CT_EXPANSION_COUNT=$CT_EXPANSION_COUNT" >> $GITHUB_OUTPUT

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$THIS_TAG" ]; then
            CHANGELOG+="### Initial release — baseline inventory\n\n"
            CHANGELOG+="| Metric | Value |\n"
            CHANGELOG+="|--------|-------|\n"
            CHANGELOG+="| Total bank.in domains tracked | ${DOMAIN_COUNT} |\n"
            CHANGELOG+="| New subdomains | ${NEW_COUNT} |\n"
            CHANGELOG+="| CT expansion entries | ${CT_EXPANSION_COUNT} |\n"
          else
            # Delta from previous tag to HEAD
            CHANGED_FILES=$(git diff --name-only "$PREV_TAG"..HEAD -- data/ | wc -l)
            COMMITS_SINCE=$(git rev-list --count "$PREV_TAG"..HEAD)

            # Subdomain-level delta if new_subdomains.txt exists
            SUBDOMAIN_DELTA=""
            if [ -f data/new_subdomains.txt ] && [ -s data/new_subdomains.txt ]; then
              SUBDOMAIN_DELTA=$(head -20 data/new_subdomains.txt | sed 's/^/  - /')
              TOTAL_NEW=$(wc -l < data/new_subdomains.txt)
            fi

            CHANGELOG+="### Delta from ${PREV_TAG}\n\n"
            CHANGELOG+="| Metric | Value |\n"
            CHANGELOG+="|--------|-------|\n"
            CHANGELOG+="| Commits since last release | ${COMMITS_SINCE} |\n"
            CHANGELOG+="| Data files changed | ${CHANGED_FILES} |\n"
            CHANGELOG+="| Total bank.in domains tracked | ${DOMAIN_COUNT} |\n"
            CHANGELOG+="| New subdomains found | ${NEW_COUNT} |\n"
            CHANGELOG+="| CT expansion entries | ${CT_EXPANSION_COUNT} |\n"

            if [ -n "$SUBDOMAIN_DELTA" ]; then
              CHANGELOG+="\n### New subdomains\n"
              CHANGELOG+="\`\`\`\n${SUBDOMAIN_DELTA}\n\`\`\`\n"
              if [ "$TOTAL_NEW" -gt 20 ]; then
                CHANGELOG+="_...and $((TOTAL_NEW - 20)) more_\n"
              fi
            fi
          fi

          echo "changelog<<__CHANGELOG_EOF__" >> $GITHUB_OUTPUT
          printf "%b" "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "__CHANGELOG_EOF__" >> $GITHUB_OUTPUT

      - name: Build release artifact
        shell: bash
        run: |
          mkdir -p release-assets
          cp data/bank_domains_status.csv release-assets/
          cp data/bank_domains_ct_expansion.csv release-assets/ 2>/dev/null || true
          cp data/new_subdomains.txt release-assets/ 2>/dev/null || true
          # Compress the full data snapshot
          tar czf release-assets/bank-in-data-snapshot.tar.gz data/*.csv data/new_subdomains.txt 2>/dev/null || true

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: false
