name: Refresh subdomain audit

on:
  schedule:
    # Daily at 02:30 UTC (08:00 IST)
    - cron: "30 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dnspython

      - name: Discover new subdomains
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull the latest bank_domains_status.csv (from the existing repo)
          mkdir -p out
          cp data/bank_domains_status.csv out/bank_domains_status.csv

          # Wayback CDX (slow, retry on failure)
          echo "=== Wayback ==="
          curl -sS --max-time 240 \
            "http://web.archive.org/cdx/search/cdx?url=bank.in&matchType=domain&collapse=urlkey&limit=200000&output=json&fl=original" \
            | python3 -c "
          import json, sys, re
          try:
              data = json.load(sys.stdin)
              for row in data[1:]:
                  host = row[0].split('/')[2] if '://' in row[0] else row[0].split('/')[0]
                  host = host.split(':')[0]
                  if host.endswith('.bank.in'):
                      print(host.lower())
          except Exception as e:
              print(f'Wayback failed: {e}', file=sys.stderr)
          " | sort -u > out/wayback.txt || touch out/wayback.txt
          echo "Wayback: $(wc -l < out/wayback.txt) hosts"

          # urlscan.io (free, 100 cap)
          echo "=== urlscan ==="
          curl -sS --max-time 30 \
            "https://urlscan.io/api/v1/search/?q=domain%3Abank.in" \
            | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              for r in d.get('results', []):
                  dom = r.get('page', {}).get('domain', '')
                  if dom.endswith('.bank.in'):
                      print(dom.lower())
          except Exception as e:
              print(f'urlscan failed: {e}', file=sys.stderr)
          " | sort -u > out/urlscan.txt || touch out/urlscan.txt
          echo "urlscan: $(wc -l < out/urlscan.txt) hosts"

          # HackerTarget
          echo "=== HackerTarget ==="
          curl -sS --max-time 60 \
            "https://api.hackertarget.com/hostsearch/?q=bank.in" \
            | awk -F, 'NF>=1 {print $1}' | sort -u > out/hackertarget.txt \
            || touch out/hackertarget.txt
          echo "HackerTarget: $(wc -l < out/hackertarget.txt) hosts"

          # crt.sh Certificate Transparency logs
          echo "=== crt.sh CT Logs ==="
          python3 scripts/fetch_ct_subdomains.py
          if [ -f data/ct_new_subdomains.csv ]; then
            # Extract domains from CT CSV for merging
            python3 -c "
            import csv, sys
            with open('data/ct_new_subdomains.csv') as f:
                reader = csv.DictReader(f)
                for row in reader:
                    print(row['domain'])
            " | sort -u > out/ct.txt
            echo "CT: $(wc -l < out/ct.txt) hosts"
          else
            touch out/ct.txt
          fi

          # Merge and dedupe
          cat out/wayback.txt out/urlscan.txt out/hackertarget.txt out/ct.txt \
            | sort -u > out/discovered.txt
          echo "Total discovered: $(wc -l < out/discovered.txt)"

      - name: Build new subdomain list (not in existing CSV)
        run: |
          python3 -c "
          import csv
          existing = set()
          with open('out/bank_domains_status.csv') as f:
              for r in csv.DictReader(f):
                  existing.add(r['domain'].lower())
          new = set()
          for line in open('out/discovered.txt'):
              line = line.strip().lower()
              if line and line not in existing and line.endswith('.bank.in'):
                  new.add(line)
          for d in sorted(new):
              print(d)
          " > out/new_subdomains.txt
          echo "New: $(wc -l < out/new_subdomains.txt) subdomains"

      - name: Probe new subdomains (from Wayback/urlscan/HackerTarget)
        run: |
          if [ -s out/new_subdomains.txt ]; then
            python3 scripts/scan_subdomains.py \
              --in-list out/new_subdomains.txt \
              --out-csv out/bank_domains_new_probed.csv \
              --concurrency 50
          else
            echo "No new subdomains to probe"
            : > out/bank_domains_new_probed.csv
          fi

      - name: Probe CT-discovered subdomains
        run: |
          if [ -f data/ct_new_subdomains.csv ] && [ -s data/ct_new_subdomains.csv ]; then
            # Extract domains for probing
            python3 -c "
            import csv, sys
            with open('data/ct_new_subdomains.csv') as f:
                reader = csv.DictReader(f)
                for row in reader:
                    print(row['domain'])
            " > out/ct_domains_to_probe.txt
            
            # Probe DNS/HTTPS
            python3 scripts/scan_subdomains.py \
              --in-list out/ct_domains_to_probe.txt \
              --out-csv out/ct_probed.csv \
              --concurrency 50
            
            # Merge probe results with CT metadata
            python3 -c "
            import csv, sys
            # Load CT metadata (keyed by domain)
            ct_meta = {}
            with open('data/ct_new_subdomains.csv') as f:
                for row in csv.DictReader(f):
                    ct_meta[row['domain']] = row
            
            # Merge with probe results
            merged = []
            with open('out/ct_probed.csv') as f:
                for row in csv.DictReader(f):
                    domain = row['domain']
                    if domain in ct_meta:
                        # Preserve CT metadata
                        for k, v in ct_meta[domain].items():
                            if k not in row:
                                row[k] = v
                    merged.append(row)
            
            # Write enriched CT expansion CSV
            if merged:
                fieldnames = ['domain', 'dns_resolves', 'ip_address', 'https_works',
                              'http_works', 'status_code', 'title', 'final_url', 'error',
                              'ct_search_type', 'ct_issuer_ca_id', 'ct_issuer_name',
                              'ct_not_before', 'ct_not_after', 'ct_serial_number',
                              'ct_entry_timestamp', 'ct_id']
                with open('out/bank_domains_ct_expansion.csv', 'w', newline='') as f:
                    w = csv.DictWriter(f, fieldnames=fieldnames)
                    w.writeheader()
                    w.writerows(merged)
            else:
                open('out/bank_domains_ct_expansion.csv', 'w').close()
            "
          else
            echo "No new CT subdomains to probe"
            : > out/bank_domains_ct_expansion.csv
          fi

      - name: Merge and dedupe master CSV
        run: |
          python3 -c "
          import csv
          existing = []
          with open('data/bank_domains_status.csv') as f:
              reader = csv.DictReader(f)
              fieldnames = reader.fieldnames
              existing = list(reader)
          
          # Merge new probed subdomains (Wayback/urlscan/HackerTarget)
          new_probed = []
          if __import__('os').path.exists('out/bank_domains_new_probed.csv'):
              with open('out/bank_domains_new_probed.csv') as f:
                  new_probed = list(csv.DictReader(f))
          
          # Merge CT expansion subdomains
          ct_expansion = []
          if __import__('os').path.exists('out/bank_domains_ct_expansion.csv'):
              with open('out/bank_domains_ct_expansion.csv') as f:
                  ct_expansion = list(csv.DictReader(f))
          
          seen = {r['domain'] for r in existing}
          for r in new_probed + ct_expansion:
              if r['domain'] not in seen:
                  existing.append(r)
                  seen.add(r['domain'])
          
          existing.sort(key=lambda r: r['domain'])
          with open('data/bank_domains_status.csv', 'w', newline='') as f:
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              w.writerows(existing)
          live = sum(1 for r in existing if r.get('dns_resolves') == 'True')
          ok = sum(1 for r in existing if r.get('status_code') == '200')
          print(f'Merged: {len(existing)} total, {live} live, {ok} HTTP 200')
          "

      - name: Update discovered list
        run: |
          cat out/discovered.txt | sort -u > data/new_subdomains.txt
          echo "Updated data/new_subdomains.txt with $(wc -l < data/new_subdomains.txt) entries"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/; then
            echo "No data changes to commit"
          else
            git add data/
            git commit -m "chore: refresh bank.in audit ($(date -u +%F))"
            git push
          fi
