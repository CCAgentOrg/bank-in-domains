name: Refresh subdomain audit

on:
  schedule:
    # Daily at 02:30 UTC (08:00 IST)
    - cron: "30 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dnspython

      - name: Install subfinder
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Discover new subdomains
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull the latest bank_domains_status.csv (from the existing repo)
          mkdir -p out
          cp data/bank_domains_status.csv out/bank_domains_status.csv

          # Wayback CDX — only recent additions (incremental, last 7 days)
          echo "=== Wayback (incremental: last 7d) ==="
          FROM_DATE=$(date -u -d '7 days ago' +%Y%m%d%H%M%S)
          curl -sS --max-time 120 \
            "http://web.archive.org/cdx/search/cdx?url=bank.in&matchType=domain&collapse=urlkey&limit=50000&output=json&fl=original&from=${FROM_DATE}" \
            | python3 -c "
          import json, sys, re
          try:
              data = json.load(sys.stdin)
              for row in data[1:]:
                  host = row[0].split('/')[2] if '://' in row[0] else row[0].split('/')[0]
                  host = host.split(':')[0]
                  if host.endswith('.bank.in'):
                      print(host.lower())
          except Exception as e:
              print(f'Wayback failed: {e}', file=sys.stderr)
          " | sort -u > out/wayback.txt || touch out/wayback.txt
          echo "Wayback: $(wc -l < out/wayback.txt) hosts"

          # urlscan.io (free, 100 cap)
          echo "=== urlscan ==="
          curl -sS --max-time 30 \
            "https://urlscan.io/api/v1/search/?q=domain%3Abank.in" \
            | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              for r in d.get('results', []):
                  dom = r.get('page', {}).get('domain', '')
                  if dom.endswith('.bank.in'):
                      print(dom.lower())
          except Exception as e:
              print(f'urlscan failed: {e}', file=sys.stderr)
          " | sort -u > out/urlscan.txt || touch out/urlscan.txt
          echo "urlscan: $(wc -l < out/urlscan.txt) hosts"

          # HackerTarget
          echo "=== HackerTarget ==="
          curl -sS --max-time 60 \
            "https://api.hackertarget.com/hostsearch/?q=bank.in" \
            | awk -F, 'NF>=1 {print $1}' | sort -u > out/hackertarget.txt \
            || touch out/hackertarget.txt
          echo "HackerTarget: $(wc -l < out/hackertarget.txt) hosts"

          # crt.sh Certificate Transparency logs
          echo "=== crt.sh CT Logs ==="
          python3 scripts/fetch_ct_subdomains.py
          if [ -f data/ct_new_subdomains.csv ]; then
            python3 scripts/merge_ct_results.py --extract-domains \
              --ct-csv data/ct_new_subdomains.csv | sort -u > out/ct.txt
            echo "CT: $(wc -l < out/ct.txt) hosts"
          else
            touch out/ct.txt
          fi

          # subfinder (all passive sources: AlienVault, VirusTotal, SecurityTrails, Shodan, +20 more)
          echo "=== subfinder ==="
          subfinder -d bank.in -all -silent -o out/subfinder.txt 2>/dev/null || touch out/subfinder.txt
          echo "subfinder: $(wc -l < out/subfinder.txt) hosts"

          # Merge and dedupe all sources including subfinder
          cat out/wayback.txt out/urlscan.txt out/hackertarget.txt out/ct.txt out/subfinder.txt \
            | sort -u > out/discovered.txt
          echo "Total discovered: $(wc -l < out/discovered.txt)"

      - name: Build new subdomain list (not in existing CSV)
        id: build_new_subs
        run: |
          python3 scripts/build_new_subdomains.py \
            --existing out/bank_domains_status.csv \
            --discovered out/discovered.txt > out/new_subdomains.txt

          echo "New: $(wc -l < out/new_subdomains.txt) subdomains"

      - name: Check if anything to do
        id: check_pending
        run: |
          has_new=false
          [ -s out/new_subdomains.txt ] && has_new=true
          [ -f data/ct_new_subdomains.csv ] && [ -s data/ct_new_subdomains.csv ] && has_new=true
          echo "has_new=$has_new" >> "$GITHUB_OUTPUT"
          if [ "$has_new" = "true" ]; then
            echo "New subdomains or CT data pending — proceeding with probe/merge"
          else
            echo "Nothing new — skipping probe, merge, and commit"
          fi

      - name: Probe new subdomains (from Wayback/urlscan/HackerTarget)
        if: steps.check_pending.outputs.has_new == 'true'
        run: |
          if [ -s out/new_subdomains.txt ]; then
            python3 scripts/scan_subdomains.py \
              --in-list out/new_subdomains.txt \
              --out-csv out/bank_domains_new_probed.csv \
              --concurrency 200
          else
            echo "No new subdomains to probe"
            : > out/bank_domains_new_probed.csv
          fi

      - name: Probe CT-discovered subdomains
        if: steps.check_pending.outputs.has_new == 'true'
        run: |
          if [ -f data/ct_new_subdomains.csv ] && [ -s data/ct_new_subdomains.csv ]; then
            # Extract domains for probing
            python3 scripts/merge_ct_results.py --extract-domains \
              --ct-csv data/ct_new_subdomains.csv > out/ct_domains_to_probe.txt

            # Probe DNS/HTTPS
            python3 scripts/scan_subdomains.py \
              --in-list out/ct_domains_to_probe.txt \
              --out-csv out/ct_probed.csv \
              --concurrency 200

            # Merge probe results with CT metadata
            python3 scripts/merge_ct_results.py \
              --ct-csv data/ct_new_subdomains.csv \
              --probe-csv out/ct_probed.csv \
              --out-csv out/bank_domains_ct_expansion.csv
          else
            echo "No new CT subdomains to probe"
            : > out/bank_domains_ct_expansion.csv
          fi

      - name: Merge and dedupe master CSV
        if: steps.check_pending.outputs.has_new == 'true'
        run: |
          python3 scripts/merge_master_csv.py

      - name: Update discovered list
        if: steps.check_pending.outputs.has_new == 'true'
        run: |
          cat out/discovered.txt | sort -u > data/new_subdomains.txt
          echo "Updated data/new_subdomains.txt with $(wc -l < data/new_subdomains.txt) entries"

      - name: Commit and push
        if: steps.check_pending.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/; then
            echo "No data changes to commit"
          else
            git add data/
            git commit -m "chore: refresh bank.in audit ($(date -u +%F))"
            git push
          fi
