name: CT Log Refresh (Every 6 Hours)

on:
  schedule:
    # Every 6 hours: 0, 6, 12, 18 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ct-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dnspython

      - name: Fetch CT logs (default mode - active certs only)
        run: |
          python3 scripts/fetch_ct_subdomains.py

      - name: Probe CT-discovered subdomains
        run: |
          if [ -f data/ct_new_subdomains.csv ] && [ -s data/ct_new_subdomains.csv ]; then
            python3 scripts/merge_ct_results.py --extract-domains \
              --ct-csv data/ct_new_subdomains.csv > out/ct_domains_to_probe.txt

            python3 scripts/scan_subdomains.py \
              --in-list out/ct_domains_to_probe.txt \
              --out-csv out/ct_probed.csv \
              --concurrency 50

            python3 scripts/merge_ct_results.py \
              --ct-csv data/ct_new_subdomains.csv \
              --probe-csv out/ct_probed.csv \
              --out-csv out/bank_domains_ct_expansion.csv
          else
            echo "No new CT subdomains to probe"
            : > out/bank_domains_ct_expansion.csv
          fi

      - name: Merge CT expansion into master
        run: |
          python3 scripts/merge_master_csv.py --ct-only

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/; then
            echo "No data changes to commit"
          else
            git add data/
            git commit -m "chore: CT refresh $(date -u +%F_%H:%M)"
            git push
          fi